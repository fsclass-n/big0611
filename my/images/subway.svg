<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)"/>
  <g transform="translate(50, 50)">
    <!-- Subway train representation -->
    <rect x="50" y="80" width="250" height="80" rx="10" fill="white" opacity="0.9"/>
    <rect x="60" y="90" width="40" height="30" rx="5" fill="#667eea"/>
    <rect x="110" y="90" width="40" height="30" rx="5" fill="#667eea"/>
    <rect x="160" y="90" width="40" height="30" rx="5" fill="#667eea"/>
    <rect x="210" y="90" width="40" height="30" rx="5" fill="#667eea"/>
    <rect x="260" y="90" width="30" height="30" rx="5" fill="#764ba2"/>
    
    <!-- Wheels -->
    <circle cx="80" cy="170" r="15" fill="#2d3748"/>
    <circle cx="130" cy="170" r="15" fill="#2d3748"/>
    <circle cx="180" cy="170" r="15" fill="#2d3748"/>
    <circle cx="230" cy="170" r="15" fill="#2d3748"/>
    <circle cx="270" cy="170" r="15" fill="#2d3748"/>
    
    <!-- Data visualization elements -->
    <rect x="50" y="20" width="30" height="40" fill="white" opacity="0.7"/>
    <rect x="90" y="10" width="30" height="50" fill="white" opacity="0.7"/>
    <rect x="130" y="25" width="30" height="35" fill="white" opacity="0.7"/>
    <rect x="170" y="5" width="30" height="55" fill="white" opacity="0.7"/>
    <rect x="210" y="15" width="30" height="45" fill="white" opacity="0.7"/>
    <rect x="250" y="20" width="30" height="40" fill="white" opacity="0.7"/>
  </g>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Subway Data Analysis</text>
</svg>
