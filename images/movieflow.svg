<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  <g transform="translate(50, 40)">
    <!-- Movie screen -->
    <rect x="20" y="20" width="260" height="160" rx="5" fill="white" opacity="0.9"/>
    <rect x="30" y="30" width="240" height="140" rx="3" fill="#2d3748"/>
    
    <!-- Play button -->
    <polygon points="140,70 140,130 190,100" fill="white"/>
    
    <!-- Film strip -->
    <rect x="20" y="190" width="260" height="30" fill="white" opacity="0.8"/>
    <rect x="30" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="55" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="80" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="105" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="130" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="155" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="180" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="205" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="230" y="195" width="15" height="20" fill="#f093fb"/>
    <rect x="255" y="195" width="15" height="20" fill="#f093fb"/>
    
    <!-- Stars -->
    <polygon points="50,240 53,250 63,250 55,257 58,267 50,260 42,267 45,257 37,250 47,250" fill="white"/>
    <polygon points="90,240 93,250 103,250 95,257 98,267 90,260 82,267 85,257 77,250 87,250" fill="white"/>
    <polygon points="130,240 133,250 143,250 135,257 138,267 130,260 122,267 125,257 117,250 127,250" fill="white"/>
    <polygon points="170,240 173,250 183,250 175,257 178,267 170,260 162,267 165,257 157,250 167,250" fill="white"/>
    <polygon points="210,240 213,250 223,250 215,257 218,267 210,260 202,267 205,257 197,250 207,250" fill="white"/>
    <polygon points="250,240 253,250 263,250 255,257 258,267 250,260 242,267 245,257 237,250 247,250" fill="white"/>
  </g>
  <text x="200" y="290" text-anchor="middle" fill="white" font-size="20" font-weight="bold">MovieFlow</text>
</svg>
